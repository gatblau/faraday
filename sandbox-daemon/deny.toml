# cargo-deny config (ADR-018 dependency-advisory gate). Run in CI / Phase 6.
[advisories]
yanked = "deny"
# Scoped, documented waivers. Both reach the tree ONLY via the `testcontainers`
# dev-dependency (integration tests) — never the shipped `faradayd` binary — and
# neither has a safe upgrade. Revisit when testcontainers updates its transitive deps.
ignore = [
    { id = "RUSTSEC-2025-0111", reason = "tokio-tar PAX-header vuln (CVE-2025-62518); dev-only via testcontainers→bollard; crate archived, no safe upgrade" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; dev-only via testcontainers; no safe upgrade" },
]
[bans]
multiple-versions = "warn"
[licenses]
# Zlib and Unicode-3.0 are OSI/standard permissive licences pulled in transitively
# (Unicode-3.0 supersedes Unicode-DFS-2016 in newer ICU crates).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
# `faradayd` is publish = false and carries no `license` field; skip the workspace's
# own non-published crate rather than the third-party dependencies being audited.
private = { ignore = true }
