name: sandbox-daemon CI
on: { push: {}, pull_request: {} }
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: sandbox-daemon } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy,rustfmt,llvm-tools-preview, targets: wasm32-wasip1 }
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --all-targets
      # Run the suite under source-based coverage. llvm-cov runs the same tests as
      # `cargo test` (Docker required for testcontainers — RISK-003) and fails the
      # job on any test failure; the extra report steps reuse the same profdata.
      - run: cargo llvm-cov --no-report --features integration
      - run: cargo llvm-cov report --summary-only
      - run: cargo llvm-cov report --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with: { name: coverage-lcov, path: sandbox-daemon/lcov.info }

  build-windows:
    # windows-deployment phase 2: prove the Tier-1 compile-blockers are gone — faradayd
    # and faradayd-ipc compile and link on Windows with the named-pipe transport stubbed,
    # and the Docker-free unit tests pass (including the stub's Unsupported assertions).
    # The Dex/mock-REST integration suite stays on ubuntu (it needs Linux containers,
    # RISK-001); coverage parity, clippy, and the arch matrix are added in phase 4.
    runs-on: windows-latest
    defaults: { run: { working-directory: sandbox-daemon } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # --workspace so the faradayd-ipc member (incl. its #[cfg(windows)] stub tests that
      # assert bind/connect return Unsupported) is built and run, not just the daemon crate.
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  security:
    # Dependency-advisory, licence, ban, and source gate (cargo-deny, ADR-018).
    # No build or Docker needed, so it runs in parallel with `build`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with: { manifest-path: sandbox-daemon/Cargo.toml, command: check }
